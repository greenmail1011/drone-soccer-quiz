{n:42,t:'TF',c:2,a:1,b:"球體外部的保護框可以使用輕質鋁合金製作。",e:"保護框嚴禁金屬，鋁合金亦不可。"},
{n:43,t:'MC',c:3,a:3,b:"前鋒球員專用的辨識LED燈應裝在哪裡？",o:["正前方","隨便","左右兩側","後方（Rear part）"],e:"前鋒辨識 LED 裝於後方。"},
{n:44,t:'MC',c:5,a:0,b:"【規則題】F9A的活動球員數量定義由誰負責？",o:["賽事主辦單位在公告中定義","隊長","裁判","國際航聯FAI"],e:"由主辦單位於公告中定義。"},
{n:45,t:'MC',c:6,a:2,b:"若球體掉落在地無法起飛且無法回中線，應如何處理？",o:["下場換人","暫停回合","該球員在該回合被視為排除（Excluded）","手動撿回"],e:"無法復飛即該回合視為排除。"},
{n:46,t:'TF',c:8,a:0,b:"賽事總監負責驗收每場比賽的最終結果。",e:"賽事總監驗收最終結果。"},
{n:47,t:'MC',c:7,a:2,b:"在雙敗淘汰制（Double Elimination）中，隊伍輸掉幾場比賽會被淘汰？",o:["三場","四場","兩場","一場"],e:"雙敗制輸 2 場即淘汰。"},
{n:48,t:'MC',c:3,a:3,b:"F9A-B的LED條至少應包含多少個LED元件？",o:["12個","20個","8個","16個"],e:"B 類 LED 最少 16 個。"},
{n:49,t:'TF',c:7,a:0,b:"若比分相同，小組賽階段判定為平手（Tie）。",e:"小組賽同分記為平手。"},
{n:50,t:'MC',c:6,a:3,b:"前鋒球員可否進入自家的球門進行防守？",o:["僅限一次","不可以","視主辦單位而定","可以"],e:"前鋒可進自家球門防守。"},
{n:51,t:'TF',c:6,a:0,b:"比賽結束的信號是由時間計時器自動發出或由裁判宣告。",e:"由計時器或裁判宣告結束。"},
{n:52,t:'MC',c:2,a:0,b:"F9A-B的球圈外徑推薦為何？",o:["70cm","80cm","60cm","50cm"],e:"B 類球圈外徑建議 70cm。"},
{n:53,t:'MC',c:5,a:0,b:"更換活動球員應在何時進行？",o:["兩回合間的休止期","回合進行中","隨時","進球後"],e:"換人於兩回合間休止期。"},
{n:54,t:'TF',c:6,a:0,b:"無人機足球是一項結合無線電控制與足球概念的團隊運動。",e:"定義正確。"},
{n:55,t:'MC',c:7,a:2,b:"【情境題】若兩隊在最後一回合戰成平手，小組賽階段應如何記錄？",o:["抽籤決定","加時賽","各得1分積分","判定雙敗"],e:"小組賽平手雙方各得 1 分。"},
{n:56,t:'TF',c:8,a:0,b:"警告、黃牌與紅牌在每場比賽結束後失效。",e:"卡片於該場後失效。"},
{n:57,t:'MC',c:6,a:1,b:"若球隊在進球後未回中線就進球，該進球是否有效？",o:["有效","無效"],e:"未回中線之進球無效。"},
{n:58,t:'TF',c:1,a:0,b:"球籠架設網子的目的是為了防止球體飛出。",e:"網子防止球體飛出。"},
{n:59,t:'MC',c:8,a:3,b:"【裁判判決】若兩隊前鋒球員在空中碰撞導致其中一台電池懸垂（Dangling），裁判應？",o:["繼續觀賽","給予碰撞者黃牌","暫停所有飛機","要求該球員基於安全停止飛行"],e:"電池外露有危險，命該機停飛。"},
{n:60,t:'TF',c:6,a:0,b:"每一回合開始前，裁判會說「Arm your quads」。",e:"開賽口令為 Arm your quads。"},
{n:61,t:'MC',c:8,a:0,b:"【裁判判決】若發現某隊在比賽中使用8S電池，應判定？",o:["直接取消賽事資格（Disqualification from event）","換電池後重賽","沒收電池","警告"],e:"超規電池＝取消賽事資格。"},
{n:62,t:'TF',c:8,a:0,b:"【判例】若計分感應器故障，計分裁判的視覺判定高於感應器。",e:"感應器故障時以人眼判定為準。"},
{n:63,t:'MC',c:8,a:1,b:"若因強風導致戶外比賽結果受影響，裁判可決定如何？",o:["延期","交換場地邊線","減分","取消"],e:"可交換邊線以平衡風向影響。"},
{n:64,t:'TF',c:5,a:0,b:"每位球員在場上只能控制一顆球。",e:"一人控一球。"},
{n:65,t:'TF',c:3,a:1,b:"紅隊的前鋒球員LED燈應設置為紅色。",e:"紅隊前鋒尾燈為藍色，故錯誤。",flag:true},
{n:66,t:'TF',c:7,a:0,b:"加時賽採取的是「驟死戰」，先得分者贏。",e:"加時為驟死制。"},
{n:67,t:'TF',c:8,a:0,b:"球員在場上辱罵對手會收到警告或黃牌。",e:"言語違規可警告或黃牌。"},
{n:68,t:'MC',c:8,a:3,b:"「主要裁判（Main Referee）」的最高權限是？",o:["決定計分","以上皆是","修改官網排名","規則應用的最終決定權"],e:"主裁判握有規則應用最終決定權。"},
{n:69,t:'MC',c:8,a:3,b:"【裁判判決】若隊伍未能在裁判要求下2-3分鐘內完成電池更換，裁判可？",o:["直接判敗","無限制等待","給予黃牌","視為延誤比賽給予警告"],e:"逾時換電池＝延誤比賽，給警告。"},
{n:70,t:'TF',c:1,a:0,b:"F9A-A的球門距離底線應為1.5公尺。",e:"A 類球門距底線 1.5m。"},
{n:71,t:'MC',c:8,a:1,b:"負責確認球員是否具備參賽資格的官員是？",o:["比賽裁判","賽事總監（Event Director）","計分裁判","觀眾"],e:"賽事總監負責資格審查。"},
{n:72,t:'MC',c:4,a:1,b:"每節電芯（Cell）充飽電後的最高電壓限制為何？",o:["4.35V","4.25V","4.20V","4.30V"],e:"單節上限 4.25V。"},
{n:73,t:'MC',c:6,a:2,b:"【比賽判例】若某球員在「Arm your quads」指令後、開賽音響前起飛，裁判應如何處置？",o:["直接判定對方獲勝","給予紅牌","停止比賽並給予對方一個點球罰球","回合繼續"],e:"搶跑＝停賽並罰對方 1 點球。"},
{n:74,t:'TF',c:8,a:0,b:"【裁判】若兩次黃牌發生在同一場比賽，則累積為紅牌。",e:"黃×2＝紅牌。"},
{n:75,t:'MC',c:7,a:1,b:"加時賽（Overtime）的獲勝準則是？",o:["飛最久","第一個進球者（驟死賽）","三分鐘結束","擲硬幣"],e:"加時驟死，先進球者勝。"},
{n:76,t:'TF',c:7,a:1,b:"如果小組賽積分相同，則擲硬幣是第一順位的排名依據。",e:"首順位為淨勝球差，非擲硬幣。"},
{n:77,t:'TF',c:4,a:0,b:"若風速超過9m/s，裁判應考慮暫停比賽。",e:"風速 >9m/s 應考慮中斷。"},
{n:78,t:'TF',c:1,a:0,b:"F9A賽事可以選擇在室內或室外舉行。",e:"室內外皆可。"},
{n:79,t:'TF',c:1,a:0,b:"兩隊的起飛區（Start area）大小必須完全一致。",e:"雙方起飛區須一致。"},
{n:80,t:'MC',c:7,a:0,b:"比賽裁判（Match Referee）在決定比賽場地位置時，應採用何種方式？",o:["擲硬幣（Coin toss）","抽籤","猜拳","指派"],e:"以擲硬幣決定場地。"},
{n:81,t:'TF',c:4,a:1,b:"活動球員可在回合進行中隨意更換遙控器。",e:"回合中不得隨意換遙控器。"},
{n:82,t:'MC',c:3,a:1,b:"兩隊的代表顏色通常為何？",o:["黃與綠","紅與藍","黑與白","橘與紫"],e:"代表色為紅與藍。"},
{n:83,t:'MC',c:5,a:0,b:"一隊總計可註冊的球員人數上限為何（含替補）？",o:["活動球員數+2","活動球員數+3","10人","活動球員數+1"],e:"註冊上限＝活動球員數＋2。"},
{n:84,t:'TF',c:6,a:1,b:"【判例】進球時球體掛在圈上未完全通過，裁判應判進球有效。",e:"須完整通過才算分。"},
{n:85,t:'MC',c:6,a:1,b:"無人機足球比賽一場由幾個回合（Sets）組成？",o:["2個","3個","4個","1個"],e:"一場 3 回合。"},
{n:86,t:'MC',c:1,a:3,b:"籠子的硬質支架部分應覆蓋什麼材質？",o:["膠帶","塑膠","金屬","緩衝吸震材料（Shock absorbing material）"],e:"硬支架需覆蓋緩衝吸震材。"},
{n:87,t:'TF',c:7,a:0,b:"比賽開始前的coin toss贏家可以選擇場地邊線。",e:"擲硬幣贏家選邊。"},
{n:88,t:'MC',c:6,a:2,b:"比賽中的得分判定是依據什麼？",o:["球體碰撞","飛過底線","球完整通過對方球門","裁判心情"],e:"球完整通過對方球門才得分。"},
{n:89,t:'TF',c:8,a:0,b:"【裁判】警告次數不計入黃牌累積，除非是因為「同一個原因」。",e:"不同原因之警告不累計成黃牌。"},
{n:90,t:'MC',c:4,a:2,b:"F9A-A使用的電池最高允許幾S？",o:["4S","8S","6S","3S"],e:"A 類上限 6S。"},
{n:91,t:'TF',c:6,a:0,b:"若球員在音效前起飛，該次起飛是無效的並受罰。",e:"搶跑無效並受罰。"},
{n:92,t:'TF',c:7,a:1,b:"小組賽中平手時，兩隊各拿3分積分。",e:"平手各拿 1 分，非 3 分。"},
{n:93,t:'MC',c:5,a:1,b:"【規則題】更換前鋒球員的機會在每一回合（Set）中共有幾次？",o:["2次","1次","無限制","0次"],e:"每回合僅 1 次換前鋒機會。"},
{n:94,t:'TF',c:8,a:0,b:"被判紅牌的球員必須退場，且球隊該場比賽少一人應戰。",e:"紅牌退場且少 1 人。"},
{n:95,t:'MC',c:1,a:0,b:"F9A-A保護籠的推薦高度為何？",o:["5公尺","6公尺","4公尺","3公尺"],e:"A 類籠高建議 5m。"},
{n:96,t:'TF',c:8,a:0,b:"比賽總監有權決定取消某隊的賽事資格，但需FAI評審團同意。",e:"取消資格需 FAI 評審團同意。"},
{n:97,t:'MC',c:7,a:2,b:"若回合比分相同且未分勝負，如何決定贏家（如需晉級）？",o:["抽籤","加時賽（黃金進球制）","以上皆可，依賽前公告","點球大戰"],e:"依賽前公告決定（多種方式皆可能）。"},
{n:98,t:'MC',c:1,a:1,b:"球門在F9A-B比賽中應距離底線多少距離？",o:["2.5公尺","1公尺","1.5公尺","2公尺"],e:"B 類球門距底線 1m。"},
{n:99,t:'TF',c:6,a:0,b:"【判例】點球罰球時，若前鋒球與防守球相撞，10秒內未進球，罰球即刻結束。",e:"點球 10 秒內未進即結束。"},
{n:100,t:'TF',c:7,a:1,b:"【判例】加時賽中兩隊同時進球，應由抽籤決定贏家。",e:"驟死制由先進球者勝，非抽籤。"},
{n:101,t:'MC',c:8,a:3,b:"【情境題】紅隊故意將球體撞向觀眾席圍網（未受損），應如何判定？",o:["警告","判點球","無罪","直接黃牌"],e:"故意危險行為即使未損也直接黃牌。"},
{n:102,t:'TF',c:8,a:0,b:"比賽裁判必須站在能俯瞰全場且能被操縱員看見的位置。",e:"裁判站位需可俯瞰全場且被看見。"},
{n:103,t:'TF',c:6,a:1,b:"點球罰球時，防守機體必須待在球門正後方。",e:"防守機非必須在球門正後方。"},
{n:104,t:'TF',c:8,a:0,b:"【裁判】計分裁判應站在球門兩側以便觀察球體是否通過。",e:"計分裁判站球門側觀察通過與否。"},
{n:105,t:'TF',c:6,a:0,b:"每場無人機足球比賽包含三回合（Sets）。",e:"一場 3 回合。"},
{n:106,t:'MC',c:2,a:3,b:"球體保護框底部的平整區域高度限制為何？",o:["3cm","5cm","1cm","2cm"],e:"底部平整區 ≤2cm。"},
{n:107,t:'MC',c:1,a:0,b:"F9A-A規定的起飛區寬度約為多少？",o:["1.5公尺","2.5公尺","2公尺","1公尺"],e:"A 類起飛區寬約 1.5m。"},
{n:108,t:'TF',c:1,a:0,b:"籠子的高度在F9A-A中建議為5公尺。",e:"A 類籠高 5m。"},
{n:109,t:'MC',c:6,a:2,b:"點球罰球（Penalty Shot）的時限是幾秒？",o:["5秒","15秒","10秒","30秒"],e:"點球時限 10 秒。"},
{n:110,t:'TF',c:4,a:0,b:"螺旋槳嚴禁使用金屬材料。",e:"槳禁金屬。"},
{n:111,t:'TF',c:4,a:0,b:"活動球員可以使用任何2.4GHz的遙控設備。",e:"可用合規之 2.4GHz 設備。"},
{n:112,t:'MC',c:4,a:0,b:"F9A-B的螺旋槳最大直徑限制為何？",o:["3英吋","5英吋","2英吋","4英吋"],e:"B 類槳上限 3 吋。"},
{n:113,t:'TF',c:2,a:0,b:"球體底部可以有平坦區域以便放置，高度不得超過2公分。",e:"底部平整區 ≤2cm。"},
{n:114,t:'MC',c:2,a:2,b:"F9A-A球體的直徑（包含保護框）應為多少？",o:["50cm+2cm","20cm+2cm","40cm+2cm","30cm+2cm"],e:"A 類球體 40cm(+2cm)。"},
{n:115,t:'MC',c:5,a:3,b:"教練或助手在比賽中是否算作團隊成員？",o:["視主辦單位而定","是","僅教練算","否"],e:"教練／助手不算上場團隊成員。"},
{n:116,t:'MC',c:4,a:2,b:"「FAIL-SAFE」裝置在F9A中的功能是？",o:["彈射球體","自動降落","停止馬達運轉","自動返航"],e:"FAIL-SAFE＝停止馬達。"},
{n:117,t:'TF',c:8,a:0,b:"警告、黃牌與紅牌均由比賽裁判授予約束。",e:"卡片原則上由比賽裁判給予（賽事總監於安全情形可另給紅牌）。",flag:true},
{n:118,t:'MC',c:8,a:1,b:"【規則題】若官方錄影與裁判現場決定有異，應以何者為準？",o:["重新比賽","現場裁判（除非處理申訴時參考錄影）","教練意見","錄影"],e:"以現場裁判為準。"},
{n:119,t:'TF',c:6,a:0,b:"前鋒（Striker）是隊中唯一可以穿過對方球門得分的人。",e:"僅前鋒能穿門得分。"},
{n:120,t:'MC',c:4,a:2,b:"F9A-A子分類中，螺旋槳的最大直徑限制為何？",o:["5英吋","8英吋","6英吋","7英吋"],e:"A 類槳上限 7 吋。"},
{n:121,t:'TF',c:6,a:1,b:"防守者可以在自家球門內長時間停留擋球。",e:"一般防守者不可長時間佔據球門。"},
{n:122,t:'MC',c:8,a:3,b:"黃牌導致的後果為何？",o:["禁止參賽","整隊退場","該球員被驅逐出該「比賽」","該球員被驅逐出該「回合」"],e:"黃牌＝逐出該回合。"},
{n:123,t:'MC',c:6,a:1,b:"【判例題】前鋒球員進球時，球體僅一半通過球門便反彈回來，是否算得分？",o:["算","不算，必須全部通過"],e:"須完整通過。"},
{n:124,t:'TF',c:8,a:1,b:"選手在進球後可以做出花式特技慶祝，即使會干擾他人。",e:"干擾他人之慶祝不被允許。"},
{n:125,t:'MC',c:2,a:1,b:"F9A-A球體在42cm的圓圈內必須能通過，這表示其公差為何？",o:["+3cm","+2cm","+1cm","無公差"],e:"40cm 球體公差 +2cm（=42cm）。"},
{n:126,t:'MC',c:4,a:1,b:"軟體恢復模式中，哪一項功能是被禁止的？",o:["Turtle mode","自動路徑矯正（Path rectification）","撞擊恢復","水平校正"],e:"禁止自動路徑矯正。"},
{n:127,t:'TF',c:6,a:0,b:"進球判定必須由計分裁判認可才算。",e:"進球需計分裁判認可。"},
{n:128,t:'MC',c:2,a:1,b:"球體保護框嚴禁使用哪種材質製作？",o:["複合材料","金屬","碳纖維","塑膠"],e:"保護框嚴禁金屬。"},
{n:129,t:'TF',c:5,a:0,b:"只有隊長能代表球隊與裁判進行正式溝通。",e:"僅隊長可正式與裁判溝通。"},
{n:130,t:'TF',c:1,a:0,b:"飛行籠網的材質若太硬可能會損壞球體，主辦單位應注意。",e:"籠網不可過硬以免損球。"},
{n:131,t:'MC',c:6,a:0,b:"前鋒球員在進球後，必須先完成什麼動作才能再次得分？",o:["回到中線後方","等待5秒","停在地上","繞球門一圈"],e:"須回中線後方才能再得分。"},

const TF_OPTS=["正確","錯誤"];
let mode='study', curCat=0, kw='';
const listEl=document.getElementById('list');
const statEl=document.getElementById('stat');

// build category chips
const catsEl=document.getElementById('cats');
function chip(id,label){const b=document.createElement('button');b.textContent=label;b.dataset.cat=id;if(id==curCat)b.classList.add('on');b.onclick=()=>{curCat=id;[...catsEl.children].forEach(c=>c.classList.toggle('on',c.dataset.cat==id));render();};return b;}
catsEl.appendChild(chip(0,'全部'));
Object.keys(CATS).forEach(k=>catsEl.appendChild(chip(k,CATS[k])));

document.querySelectorAll('#mode button').forEach(btn=>{
  btn.onclick=()=>{mode=btn.dataset.mode;document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('on',b===btn));render();};
});
document.getElementById('search').oninput=e=>{kw=e.target.value.trim();render();};

function opts(q){return q.t==='TF'?TF_OPTS:q.o;}
const KEYS=['A','B','C','D'];

function render(){
  listEl.innerHTML='';
  let data=Q.filter(q=>(curCat==0||q.c==curCat));
  if(kw){const k=kw.toLowerCase();data=data.filter(q=>(q.b+opts(q).join('')+(q.e||'')).toLowerCase().includes(k)||(''+q.n)===kw);}
  statEl.textContent=`顯示 ${data.length} 題`+(mode==='quiz'?'（測驗模式：點選項作答）':'');

  // group by category when showing all
  const groups={};
  data.forEach(q=>{(groups[q.c]=groups[q.c]||[]).push(q);});
  Object.keys(groups).sort((a,b)=>a-b).forEach(cid=>{
    const head=document.createElement('div');head.className='cat-head';
    head.textContent=`${CATS[cid]}（${groups[cid].length} 題）`;listEl.appendChild(head);
    // 重點速記
    if(NOTES[cid]){
      const d=document.createElement('details');d.className='note';
      d.innerHTML=`<summary>📌 ${CATS[cid]} · 重點速記</summary><ul>${NOTES[cid].map(x=>`<li>${x}</li>`).join('')}</ul>`;
      listEl.appendChild(d);
    }
    groups[cid].forEach(q=>listEl.appendChild(card(q)));
  });
  if(!data.length)listEl.innerHTML='<p style="color:var(--sub);text-align:center;padding:30px">查無符合的題目。</p>';
}

function card(q){
  const el=document.createElement('div');el.className='q';
  const ttype=q.t==='TF'?'是非題':'選擇題';
  el.innerHTML=`<div class="meta"><span class="tag ${q.t==='TF'?'tf':'mc'}">${ttype}</span><span>第 ${q.n} 題</span>${q.flag?'<span class="flag">⚠ 對照留意</span>':''}</div>
    <div class="body">${q.b}</div>`;
  const ow=document.createElement('div');ow.className='opts';
  const os=opts(q);
  os.forEach((t,i)=>{
    const o=document.createElement('div');o.className='opt';
    o.innerHTML=`<span class="k">${KEYS[i]}</span><span>${t}</span>`;
    if(mode==='study'){ if(i===q.a)o.classList.add('correct'); }
    else{
      o.onclick=()=>{
        if(el.dataset.done)return;el.dataset.done='1';
        [...ow.children].forEach((c,j)=>{if(j===q.a)c.classList.add('correct');});
        if(i!==q.a)o.classList.add('wrong');
        o.classList.add('picked');
        ex.classList.remove('hidden');
      };
    }
    ow.appendChild(o);
  });
  el.appendChild(ow);
  const ex=document.createElement('div');ex.className='explain'+(mode==='quiz'?' hidden':'');
  ex.innerHTML=`<b>正解：${KEYS[q.a]}. ${os[q.a]}</b>　${q.e||''}`;
  el.appendChild(ex);
  return el;
}
render();
</script>
